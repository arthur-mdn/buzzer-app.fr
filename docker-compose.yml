services:
  buzzer-mongodb:
    image: mongo
    volumes:
      - buzzer_mongodb_data:/data/db
      - ./mongo/mongod.conf:/etc/mongo/mongod.conf:ro
    command: ["mongod", "--config", "/etc/mongo/mongod.conf"]
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  buzzer-client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    env_file: ./client/.env
    ports:
      - "5174:5174"
    volumes:
      - buzzer_client_node_modules:/app/node_modules
      - ./client/.env:/app/.env:ro

  buzzer-server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    env_file: ./server/.env
    environment:
      DB_URI: mongodb://buzzer-mongodb:27017/buzzer
    depends_on:
      buzzer-mongodb:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - buzzer_server_node_modules:/app/node_modules

volumes:
  buzzer_mongodb_data:
    driver: local
  buzzer_client_node_modules:
    driver: local
  buzzer_server_node_modules:
    driver: local
